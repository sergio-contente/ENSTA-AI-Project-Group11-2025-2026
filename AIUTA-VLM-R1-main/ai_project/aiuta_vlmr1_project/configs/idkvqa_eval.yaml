# Primary offline benchmark (IDKVQA) -- optional overrides merged into Config._idkvqa_eval
#
# Available modes (CLI --mode):
#   raw, raw_two_pass, threshold, kg, kg_threshold,
#   two_pass_kg, two_pass_kg_relaxed, two_pass_kg_entropy,
#   global_kg, global_kg_entropy  (require --global-kg-path pointing to build_global_kg JSON)
#
detector_type: vlmr1
questioner_type: vlmr1
trigger_type: kg

model:
  model_id: omlab/VLM-R1-Qwen2.5VL-3B-OVD-0321
  processor_id: Qwen/Qwen2.5-VL-3B-Instruct
  torch_dtype: bfloat16
  device_map: auto
  max_new_tokens: 1024

# Optional dedicated model for two_pass_kg attribute pass.
# second_pass_model:
#   model_id: Qwen/Qwen2.5-VL-3B-Instruct
#   processor_id: Qwen/Qwen2.5-VL-3B-Instruct
#   torch_dtype: bfloat16
#   device_map: auto
#   max_new_tokens: 1024

idkvqa_eval:
  # NOTE: tau=0.09 selected via sweep on val set; use with caution in comparisons
  # with KG modes that use fixed heuristics (no threshold tuning on val).
  entropy_threshold: 0.09
  abstention_rule: entropy_above_tau_to_idk
  vqa_max_new_tokens: 256
  detection_max_new_tokens: 512

output_dir: ./results
seed: 42
